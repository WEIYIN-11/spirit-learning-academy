<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111d33" />
    <title>靈獸學習學院</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="appEyebrow">靈獸學習學院</p>
          <h1 id="lessonTitle">載入課程中</h1>
        </div>
        <button class="icon-button" id="resetButton" type="button" aria-label="重置進度" title="重置進度">
          <span aria-hidden="true">↺</span>
        </button>
      </header>

      <section class="course-switcher" aria-label="課程領域">
        <label for="courseSelect">學習領域</label>
        <select id="courseSelect"></select>
      </section>

      <section class="beast-stage" aria-label="靈獸狀態">
        <button class="beast-mode-toggle" id="beastModeToggle" type="button">縮小陪伴</button>
        <div class="aurora" aria-hidden="true"></div>
        <div class="beast-wrap">
          <div class="beast-atlas" id="beastAtlas" role="img" aria-labelledby="beastName"></div>
        </div>
        <div class="beast-panel">
          <div>
            <span class="label">形態</span>
            <strong id="stageName">幼年期・靈芽</strong>
          </div>
          <div>
            <span class="label">靈力</span>
            <strong><span id="xpValue">0</span> XP</strong>
          </div>
        </div>
        <div class="meter" aria-label="成長進度">
          <span id="xpBar"></span>
        </div>
        <p class="stage-lore" id="stageLore"></p>
        <div class="beast-actions" aria-label="靈獸互動">
          <button type="button" data-action="wave">招手</button>
          <button type="button" data-action="tail">搖尾巴</button>
          <button type="button" data-action="spin">轉圈圈</button>
        </div>
        <span class="sr-only" id="beastName">靈月靈狐</span>
      </section>

      <nav class="tabs" aria-label="主要區域">
        <button class="tab active" data-view="learn" type="button">課程</button>
        <button class="tab" data-view="quiz" type="button">測驗</button>
        <button class="tab" data-view="path" type="button">旅程</button>
      </nav>

      <section class="view active" id="learnView">
        <article class="lesson-card">
          <div class="lesson-meta">
            <span id="lessonNumber">第 1 課</span>
            <span id="lessonProgress">0/0 完成</span>
          </div>
          <h2 id="conceptTitle">課程標題</h2>
          <p id="conceptBody"></p>
          <div class="term-grid" id="termGrid" aria-label="名詞解釋"></div>
          <div class="diagram-card" id="lessonDiagram" aria-label="圖解範例"></div>
          <pre class="code-card"><code id="conceptCode"></code></pre>
          <button class="primary-action" id="startQuizButton" type="button">開始小測驗</button>
        </article>
      </section>

      <section class="view" id="quizView">
        <article class="quiz-card">
          <div class="lesson-meta">
            <span id="quizCounter">題目 1/3</span>
            <span id="quizReward">+15 XP</span>
          </div>
          <h2 id="questionText"></h2>
          <div class="answers" id="answers"></div>
          <p class="feedback" id="feedback" aria-live="polite"></p>
          <div class="explain-card" id="explainCard" hidden></div>
          <button class="primary-action" id="nextButton" type="button" disabled>下一題</button>
        </article>
      </section>

      <section class="view" id="pathView">
        <div class="path-list" id="pathList"></div>
      </section>
    </main>

    <script src="./data/courses.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
